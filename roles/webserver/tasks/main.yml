---
# tasks file for roles/webserver
- name: Install Apache
  dnf:
    name: httpd
    state: present


- name: Start Apache
  service:
    name: httpd
    state: started
    enabled: yes


- name: Deploy website
  template:
    src: index.html.j2
    dest: /var/www/html/index.html
  notify:
    - restart apache
- name: Allow HTTP through firewall
  ansible.posix.firewalld:
    service: http
    permanent: yes
    state: enabled
    immediate: yes      
